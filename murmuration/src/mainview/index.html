<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Murmuration</title>
		<link rel="stylesheet" href="views://mainview/index.css" />
	</head>
	<body>
		<canvas id="scene"></canvas>

		<div id="hud">
			<header class="brand">
				<h1>MURMURATION</h1>
				<p>a webgpu flocking study &middot; electrobun &times; three.js</p>
			</header>

			<div class="stats" id="stats">
				<span id="stat-fps">— fps</span>
				<span class="dot">&middot;</span>
				<span id="stat-birds">— starlings</span>
				<span class="dot">&middot;</span>
				<span id="stat-backend">…</span>
			</div>

			<div class="hints" id="hints">
				<span><b>mouse</b> guides the falcon</span>
				<span><b>drag</b> orbit</span>
				<span><b>right-hold</b> dive</span>
				<span><b>both+drag</b> zoom</span>
				<span><b>2×click</b> scatter</span>
				<span><b>2×right</b> sound</span>
			</div>

			<div class="toolbar">
				<button id="btn-audio" title="toggle sound (a)">sound off</button>
				<button id="btn-panel" title="tuning">tune</button>
			</div>

			<div class="panel" id="panel" hidden>
				<h2>flock tuning</h2>

				<label class="row">
					<span>starlings</span>
					<select id="ctl-count">
						<option value="4096">4,096</option>
						<option value="8192">8,192</option>
						<option value="16384" selected>16,384</option>
						<option value="32768">32,768</option>
					</select>
				</label>

				<label class="row">
					<span>cohesion</span>
					<input id="ctl-cohesion" type="range" min="0" max="3" step="0.05" value="1" />
				</label>
				<label class="row">
					<span>alignment</span>
					<input id="ctl-alignment" type="range" min="0" max="3" step="0.05" value="1" />
				</label>
				<label class="row">
					<span>separation</span>
					<input id="ctl-separation" type="range" min="0" max="3" step="0.05" value="1" />
				</label>
				<label class="row">
					<span>speed</span>
					<input id="ctl-speed" type="range" min="0.5" max="2" step="0.05" value="1" />
				</label>
				<label class="row">
					<span>wind</span>
					<input id="ctl-wind" type="range" min="-1" max="1" step="0.05" value="0.15" />
				</label>
				<label class="row check">
					<span>falcon</span>
					<input id="ctl-falcon" type="checkbox" checked />
				</label>
			</div>
		</div>

		<div id="fatal" hidden>
			<div class="fatal-card">
				<h2>WebGPU unavailable</h2>
				<p id="fatal-msg"></p>
			</div>
		</div>

		<script type="module" src="views://mainview/index.js"></script>
	</body>
</html>
